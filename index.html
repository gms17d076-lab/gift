<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний хайрт нөхөр</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --dark-color: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #fff0f3 0%, #ffccd5 50%, #ff85a1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--dark-color);
        }

        .header { text-align: center; margin-bottom: 25px; }

        .btn {
            background: var(--dark-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 1rem;
        }

        /* КАРТУУДЫН САВ */
        .game-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            perspective: 1000px;
            margin-top: 20px;
        }

        .card {
            width: 130px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            /* ЭНЭ ХЭСЭГ ТЕКСТИЙГ НУУЦАЛНА */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 10px;
            box-sizing: border-box;
        }

        /* КАРТНЫ НҮҮР ТАЛ - ЮУ Ч ХАРАГДАХГҮЙ */
        .card-front {
            background: linear-gradient(135deg, var(--primary-color), #ff758f);
            border: 3px solid white;
        }

        .card-front::after {
            content: "🎁";
            font-size: 45px;
        }

        /* КАРТНЫ АР ТАЛ - ЭРГЭХЭД ЗӨВХӨН БИЧИГ ХАРАГДАНА */
        .card-back {
            background: white;
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
            color: var(--dark-color);
            text-align: center;
        }

        .card-back h3 { 
            color: #2ecc71; 
            font-size: 0.9rem; 
            margin-bottom: 10px; 
        }

        .card-back p { 
            font-size: 0.85rem; 
            font-weight: bold;
            line-height: 1.4;
            margin: 0;
        }

        #note-section {
            display: none;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            border-left: 8px solid var(--primary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Сайн аав, сайн нөхөр байсныг тань өндрөөр үнэлэн энэхүү бяцхан урамшууллыг бэлдлээ ❤️</h1>
        <button id="shuffleBtn" class="btn" onclick="shuffleCards()">Карт холих</button>
    </div>

    <div class="game-container" id="cardContainer">
        <div class="card" onclick="flipCard(this, 0)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🎮 7 цаг PC тоглох эрх</p>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 1)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🧼 10 хоног гэрийн бүх ажлаас чөлөөлөгдөх</p>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 2)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🍻 Найзуудтайгаа нэгэн орой халбага бийв уух эрх</p>
            </div>
        </div>
    </div>

    <div id="note-section">
        <p id="note-content"></p>
    </div>

    <script>
        const notes = [
            "Заасан хугацаанд тоглох ба хугацаа дуусахтай зэрэгцэн хаалганы гадаа ирсэн байх. Хүчинтэй хугацаа 7 хоног.",
            "Нэмэлт бэлэг: +4 цаг PC тоглох эрх. Хүчинтэй хугацаа 3 хоног.",
            "Зөвхөн пиво уух ба согтож агсан тавихгүй байх. 01:00 цаг гэхэд гэрийн хаалгаар орж ирэх."
        ];

        let canFlip = true;

        function shuffleCards() {
            const container = document.getElementById('cardContainer');
            const cards = Array.from(container.children);
            cards.forEach(card => card.classList.remove('is-flipped'));
            document.getElementById('note-section').style.display = 'none';
            canFlip = true;

            setTimeout(() => {
                for (let i = cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    container.appendChild(cards[j]);
                }
            }, 300);
        }

        function flipCard(cardElement, index) {
            if (!canFlip) return;
            
            cardElement.classList.add('is-flipped');
            canFlip = false; 

            setTimeout(() => {
                document.getElementById('note-content').innerText = "📌 Санамж: " + notes[index];
                document.getElementById('note-section').style.display = 'block';
            }, 600);
        }

    </script>
</body>
</html>
