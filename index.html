<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний хайрт нөхөр С.Энхжинд</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --dark-color: #590d22;
            --bg-gradient: radial-gradient(circle at center, #fff0f3 0%, #ffccd5 50%, #ff85a1 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--dark-color);
        }

        /* ЭХЛЭЛ ХЭСЭГ */
        .main-screen {
            text-align: center;
            display: block; /* Анх харагдана */
            animation: fadeIn 0.5s ease;
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; }

        .btn {
            background: var(--dark-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); background: #800f2f; }

        /* КАРТ СҮЛЖЭЭ (ХАЖУУ ТИЙШ) */
        .card-container {
            display: none; /* Товч дарахад гарна */
            flex-direction: row;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            width: 120px;
            height: 180px;
            background: linear-gradient(135deg, var(--primary-color), #ff758f);
            border: 4px solid white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); }

        /* ШИНЭ ХУУДАС (БЭЛЭГ ГАРЧ ИРЭХ ХЭСЭГ) */
        #result-screen {
            display: none; /* Нууцлагдсан */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-gradient);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .result-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            border-bottom: 10px solid var(--primary-color);
        }

        .result-box h2 { color: #2ecc71; margin-top: 0; }
        .gift-text { font-size: 1.3rem; font-weight: bold; margin: 20px 0; color: #333; }
        .note-box { 
            background: #f9f9f9; 
            padding: 15px; 
            border-left: 5px solid var(--primary-color); 
            text-align: left;
            font-size: 0.95rem;
            color: #555;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-screen" id="mainScreen">
        <h1>Сайн аав, сайн нөхөр байсныг тань өндрөөр үнэлэн энэхүү бяцхан урамшууллыг бэлдлээ. ❤️</h1>
        <p>Урамшууллаас авахын тулд карт сонгох товчийг дарна уу.</p>
        <button class="btn" onclick="showCards()">Карт сонгох</button>
    </div>

    <div class="card-container" id="cardContainer">
        <div class="card" onclick="openGift(0)">🎁</div>
        <div class="card" onclick="openGift(1)">🎁</div>
        <div class="card" onclick="openGift(2)">🎁</div>
    </div>

    <div id="result-screen">
        <div class="result-box">
            <h2>Баяр хүргэе! 🎉</h2>
            <div class="gift-text" id="giftText"></div>
            <div class="note-box">
                <strong>📌 Санамж:</strong>
                <p id="noteText"></p>
            </div>
            <br>
            <button class="btn" onclick="location.reload()">Дахин эхлэх</button>
        </div>
    </div>

    <script>
        const gifts = [
            "🎮 7 цаг PC тоглох эрх",
            "🧼 10 хоног гэрийн ажлаас чөлөөлөгдөх",
            "🍻 Найзуудтайгаа пиво уух эрх"
        ];

        const notes = [
            "Заасан хугацаанд тоглох ба хугацаа дуусахтай зэрэгцэн хаалганы гадаа ирсэн байх. Хүчинтэй хугацаа 7 хоног.",
            "Нэмэлт бэлэг: +4 цаг PC тоглох эрх. Хүчинтэй хугацаа 3 хоног.",
            "Зөвхөн пиво уух ба согтож агсан тавихгүй байх. 01:00 цаг гэхэд гэрийн хаалгаар орж ирэх."
        ];

        function showCards() {
            // Эхний текстийг нууж, картуудыг гаргаж ирнэ
            document.getElementById('mainScreen').querySelector('button').style.display = 'none';
            document.getElementById('cardContainer').style.display = 'flex';
            
            // Картуудыг санамсаргүй холих
            const container = document.getElementById('cardContainer');
            const cards = Array.from(container.children);
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                container.appendChild(cards[j]);
            }
        }

        function openGift(index) {
            // Шинэ хуудас (result-screen) гаргаж ирэх
            document.getElementById('giftText').innerText = gifts[index];
            document.getElementById('noteText').innerText = notes[index];
            document.getElementById('result-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
