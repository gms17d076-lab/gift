<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миний хайрт нөхөрт</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ffb3c1;
            --dark-color: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--dark-color);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 600px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; }

        .game-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            perspective: 1000px;
            margin-bottom: 40px;
        }

        .card {
            width: 200px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }

        .card-front {
            background: var(--primary-color);
            border: 5px solid white;
        }

        .card-front::after {
            content: "🎁";
            font-size: 50px;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
        }

        .card-back h3 { color: #2ecc71; margin-bottom: 10px; }

        #note-section {
            display: none;
            max-width: 600px;
            background: #fff;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            border-left: 5px solid var(--primary-color);
            animation: fadeIn 1s ease;
        }

        #note-section::before {
            content: "📌 Санамж:";
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-shuffle {
            background: var(--dark-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-shuffle:hover { background: #800f2f; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Сайн аав, сайн нөхөр! ❤️</h1>
        <p>Чамайг гэр бүлийнхээ төлөө хичээж байгааг чинь өндрөөр үнэлэн дараах урамшууллын нэгийг сонгохыг урьж байна.</p>
        <button class="btn-shuffle" onclick="shuffleCards()">Карт холих</button>
    </div>

    <div class="game-container" id="cardContainer">
        <div class="card" onclick="flipCard(this, 0)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🎮 7 цаг PC тоглох эрх</p>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 1)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🧼 10 хоног гэрийн ажлаас чөлөөлөгдөх эрх</p>
            </div>
        </div>
        <div class="card" onclick="flipCard(this, 2)">
            <div class="card-face card-front"></div>
            <div class="card-back">
                <h3>Баяр хүргэе!</h3>
                <p>🍻 Найзуудтайгаа халбага пиво уух эрх</p>
            </div>
        </div>
    </div>

    <div id="note-section">
        <p id="note-content"></p>
    </div>

    <script>
        const notes = [
            "Заасан хугацаанд тоглох ба хугацаа дуусахтай зэрэгцэн хаалганы гадаа ирсэн байх. Тоглох хангалттай цаг өгсөн тул хугацаа сунгахыг хатуу хориглоно. Хүчинтэй хугацаа 7 хоног.",
            "Нэмэлт бэлэг: +4 цаг PC тоглох эрх. Хүчинтэй хугацаа 3 хоног.",
            "Зөвхөн пиво уух ба архи уухыг хориглоно. Хэтрүүлэн хэрэглэж согтож, агсан тавьж, үр зулзагаа айлгаж, урамшууллыг уур бухимдал болгон хувиргахыг хатуу хориглоно. Баар цэнгээний газар орохоор бол заавал мэдэгдэх, 01:00 цаг гэхэд гэрийн хаалгаар орж ирэх."
        ];

        let canFlip = true;

        function shuffleCards() {
            const container = document.getElementById('cardContainer');
            const cards = Array.from(container.children);
            cards.forEach(card => card.classList.remove('is-flipped'));
            document.getElementById('note-section').style.display = 'none';
            canFlip = true;

            setTimeout(() => {
                for (let i = cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    container.appendChild(cards[j]);
                }
            }, 300);
        }

        function flipCard(cardElement, index) {
            if (!canFlip) return;
            
            cardElement.classList.add('is-flipped');
            canFlip = false; // Зөвхөн нэг карт сонгох боломжтой

            const noteSection = document.getElementById('note-section');
            const noteContent = document.getElementById('note-content');
            
            setTimeout(() => {
                noteContent.innerText = notes[index];
                noteSection.style.display = 'block';
            }, 600);
        }
    </script>
</body>
</html>
